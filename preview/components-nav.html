<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-bg); font-family: var(--font-body); padding: 0; }
.navbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; background: var(--color-bg); border-bottom: 1px solid rgba(11,28,73,0.1); }
.left { display: flex; align-items: center; gap: 20px; }
.brand { font-family: var(--font-head); font-size: 16px; font-weight: 800; letter-spacing: -0.02em; color: #0B1C49; }
.logo { width: 28px; height: 28px; object-fit: contain; }
.nav-links { display: flex; gap: 2px; }
.nav-link { font-family: var(--font-head); font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 24px; text-decoration: none; color: var(--color-text2); }
.nav-link.active { color: var(--lc); background: rgba(214,66,148,0.1); }
.right { display: flex; align-items: center; gap: 12px; }
.user-info { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.user-email { font-size: 12px; color: #0B1C49; }
.user-rol { font-family: var(--font-head); font-size: 10px; color: var(--color-pink); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; background: rgba(214,66,148,0.08); padding: 1px 8px; border-radius: 24px; }
.btn-ghost { background: transparent; color: var(--color-text2); border: 1px solid rgba(214,66,148,0.3); border-radius: 24px; padding: 6px 14px; font-family: var(--font-head); font-size: 11px; font-weight: 700; cursor: pointer; }
</style></head><body>
<nav class="navbar">
  <div class="left">
    <img src="../assets/logo-valdishopper.png" alt="Logo" class="logo" />
    <span class="brand">SIGMC</span>
    <div class="nav-links">
      <a class="nav-link" style="--lc:var(--color-green)">Carga de Datos</a>
      <a class="nav-link active" style="--lc:#D64294">Finanzas</a>
      <a class="nav-link" style="--lc:#9F4F69">Mejora Continua</a>
      <a class="nav-link" style="--lc:#7C3AED">Geosort</a>
    </div>
  </div>
  <div class="right">
    <div class="user-info">
      <span class="user-email">ana.garcia@valdishopper.com</span>
      <span class="user-rol">finanzas</span>
    </div>
    <button class="btn-ghost">Salir</button>
  </div>
</nav>
</body></html>
