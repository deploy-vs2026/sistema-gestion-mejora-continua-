<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-bg); font-family: var(--font-body); padding: 16px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.swatch { border-radius: 10px; overflow: hidden; width: 80px; }
.color { height: 48px; }
.label { padding: 4px 6px; background: white; font-size: 9px; font-family: var(--font-head); font-weight: 700; color: #3A4A6B; letter-spacing: 0.04em; }
.sub { font-size: 8px; color: #7A869E; font-weight: 400; font-family: var(--font-body); }
.group-label { font-family: var(--font-head); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text3); margin: 10px 0 6px; }
</style></head><body>
<div class="group-label">Semantic Status</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#00C48C;"></div><div class="label">success<div class="sub">#00C48C</div></div></div>
  <div class="swatch"><div class="color" style="background:#FF4466;"></div><div class="label">error<div class="sub">#FF4466</div></div></div>
  <div class="swatch"><div class="color" style="background:#4A90E2;"></div><div class="label">info<div class="sub">#4A90E2</div></div></div>
  <div class="swatch"><div class="color" style="background:#FF6B35;"></div><div class="label">warning<div class="sub">#FF6B35</div></div></div>
</div>
<div class="group-label">Section Accents</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#00C48C;"></div><div class="label">master<div class="sub">Carga</div></div></div>
  <div class="swatch"><div class="color" style="background:#D64294;"></div><div class="label">finanzas<div class="sub">Finanzas</div></div></div>
  <div class="swatch"><div class="color" style="background:#9F4F69;"></div><div class="label">mejora<div class="sub">Mejora</div></div></div>
  <div class="swatch"><div class="color" style="background:#7C3AED;"></div><div class="label">geosort<div class="sub">Falabella</div></div></div>
</div>
<div class="group-label">Upload Colors</div>
<div class="row">
  <div class="swatch"><div class="color" style="background:#00E5C3;"></div><div class="label">beetrak<div class="sub">#00E5C3</div></div></div>
  <div class="swatch"><div class="color" style="background:#FF6B35;"></div><div class="label">pfa<div class="sub">#FF6B35</div></div></div>
  <div class="swatch"><div class="color" style="background:#A78BFA;"></div><div class="label">delivery<div class="sub">#A78BFA</div></div></div>
  <div class="swatch"><div class="color" style="background:#7C3AED;"></div><div class="label">falabella<div class="sub">#7C3AED</div></div></div>
</div>
</body></html>
