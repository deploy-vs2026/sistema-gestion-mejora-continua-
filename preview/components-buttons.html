<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--color-bg); font-family: var(--font-body); padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.label { font-family: var(--font-head); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text3); min-width: 80px; }
button { cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--color-pink); color: #fff; border: none; border-radius: 24px; padding: 12px 28px; font-family: var(--font-head); font-size: 13px; font-weight: 700; }
.btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(214,66,148,0.3); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--color-text2); border: 1px solid rgba(214,66,148,0.3); border-radius: 24px; padding: 12px 20px; font-family: var(--font-head); font-size: 13px; font-weight: 700; }
.btn-ghost:hover { border-color: var(--color-pink); color: var(--color-pink); }
.btn-ghost.small { padding: 6px 14px; font-size: 11px; }
.btn-export { background: transparent; color: var(--color-pink); border: 1px solid rgba(214,66,148,0.3); border-radius: 24px; padding: 8px 18px; font-family: var(--font-head); font-size: 12px; font-weight: 700; }
.btn-export:hover { background: rgba(214,66,148,0.08); border-color: var(--color-pink); }
.btn-del { background: transparent; color: var(--color-red); border: 1px solid rgba(255,68,102,0.25); border-radius: 24px; padding: 4px 12px; font-family: var(--font-head); font-size: 11px; font-weight: 700; }
.btn-del:hover { background: rgba(255,68,102,0.08); }
.btn-google { display: flex; align-items: center; gap: 10px; background: #fff; color: #1a1a1a; border: 1px solid rgba(11,28,73,0.1); border-radius: 24px; padding: 14px 28px; font-family: var(--font-head); font-size: 14px; font-weight: 700; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.btn-add { background: var(--color-pink); color: #fff; border: none; border-radius: 24px; padding: 9px 20px; font-family: var(--font-head); font-size: 12px; font-weight: 700; }
</style></head><body>
<div class="row"><div class="label">Primary</div><button class="btn-primary">Procesar</button><button class="btn-primary" disabled>Disabled</button></div>
<div class="row"><div class="label">Ghost</div><button class="btn-ghost">Cancelar</button><button class="btn-ghost small">Salir</button></div>
<div class="row"><div class="label">Export</div><button class="btn-export">Exportar Excel</button></div>
<div class="row"><div class="label">Destructive</div><button class="btn-del">Eliminar</button></div>
<div class="row"><div class="label">Add</div><button class="btn-add">Agregar usuario</button></div>
<div class="row"><div class="label">Google</div><button class="btn-google"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.31z"/></svg>Iniciar sesión con Google</button></div>
</body></html>
